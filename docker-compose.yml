services:
  db:
    image: postgres:16-alpine
    container_name: edumap-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: edumap
      POSTGRES_USER: edumap
      POSTGRES_PASSWORD: edumap1234
    volumes:
      - edumap-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edumap"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  edumap-pgdata:
